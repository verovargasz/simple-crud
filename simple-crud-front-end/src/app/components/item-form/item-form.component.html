<div class="page">
  <div class="page-header">
    <h1>{{ isEdit ? 'Edit item' : 'Add item' }}</h1>
    <a class="btn" routerLink="/items">← Back</a>
  </div>

  <div class="msg msg-err" *ngIf="error">{{ error }}</div>
  <p class="empty" *ngIf="loading && isEdit">Loading...</p>

  <div class="form-card" *ngIf="!loading || !isEdit">
    <div class="row">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" [(ngModel)]="item.name" placeholder="Item name" />
      </div>
      <div class="field">
        <label for="price">Price</label>
        <input id="price" type="number" step="0.01" [(ngModel)]="item.price" placeholder="0.00" />
      </div>
    </div>
    <div class="field">
      <label for="description">Description</label>
      <input id="description" [(ngModel)]="item.description" placeholder="Optional description" />
    </div>
    <div class="row">
      <div class="field">
        <label for="category">Category</label>
        <input id="category" [(ngModel)]="item.category" placeholder="e.g. Electronics" />
      </div>
      <div class="field" style="padding-top: 22px;">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="item.active" />
          Active
        </label>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" (click)="save()" [disabled]="loading">
        {{ loading ? 'Saving...' : (isEdit ? 'Save changes' : 'Add item') }}
      </button>
      <a class="btn" routerLink="/items">Cancel</a>
    </div>
  </div>
</div>
